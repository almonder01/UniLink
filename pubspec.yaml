name: unilink
description: UniLink - University Club Engagement Platform
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  intl: ^0.19.0
  flutter_animate: ^4.5.0
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
# assets:
#   - assets/images/male.png
#   - assets/images/female.png
#   - assets/images/app_icon.png
#   - assets/images/app_icon_1.png
#   - assets/images/app_icon_2.png
#   - assets/images/app_icon_3.png
#   - assets/images/app_icon_4.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/app_icon_4.png"
